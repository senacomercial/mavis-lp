<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#000;margin:0;}
  .wrap{padding:24px 28px;}
  section+section{margin-top:18px;}
  h4{font-family:var(--font-sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sena-gold);margin:0 0 8px;font-weight:700;}
  .strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;border-radius:4px;overflow:hidden;}
  .c{height:56px;display:flex;align-items:flex-end;justify-content:space-between;padding:6px 8px;font-family:var(--font-mono);font-size:10px;}
  .c .h{opacity:.6;}
</style></head>
<body><div class="wrap">
  <section>
    <h4>Neutros — Asfalto, Carbono e Pista</h4>
    <div class="strip">
      <div class="c" style="background:#000;color:#fff"><span>Preto</span><span class="h">000</span></div>
      <div class="c" style="background:#0A0A0A;color:#fff"><span>Carbon</span><span class="h">0A0A0A</span></div>
      <div class="c" style="background:#1A1A1A;color:#fff"><span>Graph</span><span class="h">1A1A1A</span></div>
      <div class="c" style="background:#2C2C2C;color:#fff"><span>Chumbo</span><span class="h">2C2C2C</span></div>
      <div class="c" style="background:#3D3D3D;color:#fff"><span>Concr</span><span class="h">3D3D3D</span></div>
      <div class="c" style="background:#5C5C5C;color:#fff"><span>Steel</span><span class="h">5C5C5C</span></div>
      <div class="c" style="background:#F4F1EA;color:#000"><span>Creme</span><span class="h">F4F1EA</span></div>
    </div>
  </section>
  <section>
    <h4>Pódio — dourado (prestígio)</h4>
    <div class="strip" style="grid-template-columns:repeat(3,1fr);">
      <div class="c" style="background:#9A7E43;color:#fff"><span>Gold Dark</span><span class="h">9A7E43</span></div>
      <div class="c" style="background:#C5A059;color:#000"><span>Gold</span><span class="h">C5A059</span></div>
      <div class="c" style="background:#D9B977;color:#000"><span>Gold Light</span><span class="h">D9B977</span></div>
    </div>
  </section>
  <section>
    <h4>Ignição — laranja (ação)</h4>
    <div class="strip" style="grid-template-columns:repeat(3,1fr);">
      <div class="c" style="background:#B84700;color:#fff"><span>Orange Dark</span><span class="h">B84700</span></div>
      <div class="c" style="background:#E85D04;color:#000"><span>Orange</span><span class="h">E85D04</span></div>
      <div class="c" style="background:#FF7A24;color:#000"><span>Orange Light</span><span class="h">FF7A24</span></div>
    </div>
  </section>
</div></body></html>
