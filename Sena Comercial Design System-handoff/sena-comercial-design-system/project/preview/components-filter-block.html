<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#000;margin:0;}
  .wrap{padding:26px 30px;}
  .filter{border-left:3px solid #E85D04;padding:18px 22px;background:rgba(232,93,4,.06);}
  .ftitle{font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#E85D04;margin:0 0 14px;}
  .step{display:flex;align-items:flex-start;gap:12px;font-size:13px;color:#f0f0f0;line-height:1.5;margin-bottom:10px;}
  .step:last-child{margin:0;}
  .num{flex-shrink:0;background:#E85D04;color:#000;font-family:var(--font-sans);font-weight:900;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;}
</style></head>
<body><div class="wrap">
  <div class="filter">
    <div class="ftitle">O Protocolo MaVIS</div>
    <div class="step"><div class="num">1</div><div><strong>Atração com Fricção</strong> — anúncios que exigem clique consciente e afastam curiosos antes mesmo do contato.</div></div>
    <div class="step"><div class="num">2</div><div><strong>Qualificação Síncrona</strong> — "pedágio" de 3 perguntas filtra o lead antes do WhatsApp.</div></div>
    <div class="step"><div class="num">3</div><div><strong>Fechamento por Encantamento</strong> — postura ativa que transforma visitas em contratos.</div></div>
  </div>
</div></body></html>
