<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#000;margin:0;}
  .wrap{padding:24px 28px;display:flex;gap:28px;align-items:flex-end;}
  .box{background:var(--sena-gold);border-radius:3px;}
  .row{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--sena-gold);font-weight:700;}
  .radii-row{display:flex;gap:20px;align-items:flex-end;}
  .radius{width:60px;height:60px;background:var(--sena-graphite);border:1px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding:4px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
  h4{font-family:var(--font-sans);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sena-gold);margin:0 0 10px;font-weight:700;}
  .col{flex:1;}
</style></head>
<body><div class="wrap">
  <div class="col">
    <h4>Spacing (4px base)</h4>
    <div style="display:flex;gap:10px;align-items:flex-end;">
      <div class="row"><div class="box" style="width:4px;height:4px"></div><div class="val">1 · 4</div></div>
      <div class="row"><div class="box" style="width:8px;height:8px"></div><div class="val">2 · 8</div></div>
      <div class="row"><div class="box" style="width:16px;height:16px"></div><div class="val">4 · 16</div></div>
      <div class="row"><div class="box" style="width:24px;height:24px"></div><div class="val">6 · 24</div></div>
      <div class="row"><div class="box" style="width:32px;height:32px"></div><div class="val">8 · 32</div></div>
      <div class="row"><div class="box" style="width:48px;height:48px"></div><div class="val">12 · 48</div></div>
      <div class="row"><div class="box" style="width:64px;height:64px"></div><div class="val">16 · 64</div></div>
    </div>
  </div>
  <div class="col">
    <h4>Radii — afiados</h4>
    <div class="radii-row">
      <div class="radius" style="border-radius:0">0</div>
      <div class="radius" style="border-radius:2px">2</div>
      <div class="radius" style="border-radius:3px">3</div>
      <div class="radius" style="border-radius:6px">6</div>
      <div class="radius" style="border-radius:8px">8</div>
      <div class="radius" style="border-radius:9999px;width:80px">pill</div>
    </div>
  </div>
</div></body></html>
