<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#000;margin:0;}
  .wrap{padding:26px 30px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .lbl{font-family:var(--font-sans);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#C5A059;}
  .inp{background:transparent;border:0;border-bottom:1px solid rgba(255,255,255,.25);color:#fff;font-family:var(--font-sans);font-size:15px;padding:10px 0 10px;outline:none;transition:border-color .15s;}
  .inp:focus{border-color:#E85D04;}
  .inp::placeholder{color:rgba(255,255,255,.3);}
  .select{background:#0A0A0A;border:1px solid rgba(255,255,255,.15);border-radius:3px;color:#fff;font-family:var(--font-sans);font-size:14px;padding:12px 14px;appearance:none;}
  .toggle{display:flex;gap:0;border:1px solid rgba(255,255,255,.15);border-radius:3px;overflow:hidden;width:fit-content;}
  .toggle button{background:transparent;color:rgba(255,255,255,.6);border:0;padding:10px 18px;font-family:var(--font-sans);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
  .toggle .on{background:#C5A059;color:#000;}
  .checkbox{display:flex;align-items:center;gap:10px;font-family:var(--font-sans);font-size:13px;color:#eee;}
  .checkbox .box{width:18px;height:18px;background:#C5A059;display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:11px;border-radius:2px;}
</style></head>
<body><div class="wrap">
  <div class="field"><span class="lbl">Nome completo</span><input class="inp" placeholder="Airton Carneiro" value=""></div>
  <div class="field"><span class="lbl">Renda mensal</span><select class="select"><option>De R$ 10k a R$ 30k</option></select></div>
  <div class="field"><span class="lbl">Prazo de compra</span>
    <div class="toggle"><button>3 meses</button><button class="on">6 meses</button><button>12+</button></div>
  </div>
  <div class="field"><span class="lbl">Confirmação</span>
    <label class="checkbox"><span class="box">✓</span>Entendi que só serei contatado se passar no filtro.</label>
  </div>
</div></body></html>
