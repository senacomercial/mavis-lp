<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#000;margin:0;}
  .wrap{padding:26px 30px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .metric{background:#0A0A0A;border:1px solid var(--border);border-radius:6px;padding:18px 20px;position:relative;overflow:hidden;}
  .over{font-family:var(--font-sans);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#C5A059;}
  .num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:34px;color:#E85D04;margin:6px 0 2px;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
  .num.gold{color:#C5A059;}
  .sub{font-family:var(--font-sans);font-size:11px;color:rgba(255,255,255,.55);line-height:1.4;}
  .delta{position:absolute;top:16px;right:18px;font-family:var(--font-mono);font-size:10px;font-weight:700;color:#C5A059;}
</style></head>
<body><div class="wrap">
  <div class="metric"><div class="over">CPL · SEMANA 1</div><div class="num">R$ 27</div><div class="sub">–64% vs benchmark de mercado</div><div class="delta">↓ 64%</div></div>
  <div class="metric"><div class="over">Conversão</div><div class="num gold">5,0x</div><div class="sub">leads filtrados vs leads inertes</div><div class="delta">▲</div></div>
  <div class="metric"><div class="over">Vendas fechadas</div><div class="num gold">R$ 1.0M</div><div class="sub">com R$ 300 investidos · 1 semana</div></div>
</div></body></html>
