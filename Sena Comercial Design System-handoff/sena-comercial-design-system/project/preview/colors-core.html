<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#000;margin:0;}
  .wrap{padding:24px 28px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{border-radius:6px;padding:14px 14px 12px;min-height:140px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border);}
  .name{font-family:var(--font-sans);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;}
  .hex{font-family:var(--font-mono);font-size:12px;opacity:.75;margin-top:6px;}
  .role{font-family:var(--font-sans);font-size:10px;letter-spacing:.08em;text-transform:uppercase;opacity:.55;}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="sw" style="background:#000;color:#fff"><div><div class="role">Asfalto</div><div class="name">Preto</div></div><div class="hex">#000000</div></div>
    <div class="sw" style="background:#2C2C2C;color:#fff"><div><div class="role">Asfalto</div><div class="name">Chumbo</div></div><div class="hex">#2C2C2C</div></div>
    <div class="sw" style="background:#C5A059;color:#000"><div><div class="role">Pódio</div><div class="name">Dourado Campeão</div></div><div class="hex">#C5A059</div></div>
    <div class="sw" style="background:#E85D04;color:#000"><div><div class="role">Ignição</div><div class="name">Alaranjado Pulsante</div></div><div class="hex">#E85D04</div></div>
    <div class="sw" style="background:#CC0000;color:#fff"><div><div class="role">Urgência</div><div class="name">Vermelho Legítimo</div></div><div class="hex">#CC0000</div></div>
  </div>
</div></body></html>
