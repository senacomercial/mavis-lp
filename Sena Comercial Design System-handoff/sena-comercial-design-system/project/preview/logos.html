<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#000;margin:0;padding:0;}
  .card{padding:28px 32px;display:flex;align-items:center;gap:28px;min-height:160px;}
  .logo-slot{flex:1;display:flex;align-items:center;justify-content:center;padding:18px;border:1px solid var(--border);border-radius:6px;background:#0a0a0a;min-height:120px;}
  .logo-slot.light{background:#F4F1EA;}
  .logo-slot img{max-height:96px;max-width:100%;object-fit:contain;}
  .lbl{position:absolute;bottom:6px;left:10px;font-family:var(--font-sans);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-subtle);}
  .logo-slot{position:relative;}
</style></head>
<body>
<div class="card">
  <div class="logo-slot"><img src="../assets/logo-sena-white-transparent.png" alt=""><span class="lbl">Principal · Branco PNG</span></div>
  <div class="logo-slot light"><img src="../assets/logo-sena-black-transparent.png" alt=""><span class="lbl" style="color:#2c2c2c">Principal · Preto PNG</span></div>
  <div class="logo-slot"><img src="../assets/wolf-mark-white-transparent.png" alt=""><span class="lbl">Símbolo isolado · Branco PNG</span></div>
  <div class="logo-slot"><img src="../assets/logo-sena-white-transparent.png" alt="" style="max-height:60px"><span class="lbl">Escala reduzida (nav)</span></div>
</div>
</body></html>
