<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#000;margin:0;}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:10px;}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:4px;}
  .nav .brand{display:flex;align-items:center;gap:10px;}
  .nav .brand img{height:28px;}
  .nav .links{display:flex;gap:22px;font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.7);}
  .nav .links a{color:inherit;text-decoration:none;}
  .nav .cta{font-family:var(--font-sans);font-size:12px;font-weight:800;letter-spacing:.04em;background:#C5A059;color:#000;padding:10px 18px;border-radius:3px;text-decoration:none;}
  .tabs{display:flex;gap:6px;padding:6px;background:#0A0A0A;border:1px solid var(--border);border-radius:4px;width:fit-content;}
  .tabs button{background:transparent;border:0;padding:8px 16px;font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);border-radius:2px;cursor:pointer;}
  .tabs .on{background:#C5A059;color:#000;}
</style></head>
<body><div class="wrap">
  <nav class="nav">
    <div class="brand"><img src="../assets/logo-sena-small.png" alt=""><span style="font-family:'Playfair Display',serif;font-weight:700;letter-spacing:.15em;font-size:15px">SENA</span></div>
    <div class="links"><a>Mecanismo</a><a>Método</a><a>Casos</a><a>Contato</a></div>
    <a class="cta">Agendar diagnóstico</a>
  </nav>
  <div class="tabs" style="margin-top:6px"><button class="on">Individual</button><button>Grupo</button><button>Diagnóstico</button></div>
</div></body></html>
